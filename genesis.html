<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Training Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#090912;color:#e2e8f0;font-family:'Share Tech Mono',monospace;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#2d3748;border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:#34d399}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes flicker{0%,89%,91%,96%,100%{opacity:1}90%{opacity:.65}97%{opacity:.8}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 8px #34d39944}50%{box-shadow:0 0 28px #34d399aa,0 0 56px #34d39933}}
@keyframes pulseBlue{0%,100%{box-shadow:0 0 8px #60a5fa44}50%{box-shadow:0 0 28px #60a5faaa}}
@keyframes pulseOrange{0%,100%{box-shadow:0 0 8px #fb923c44}50%{box-shadow:0 0 28px #fb923caa}}
@keyframes scanPulse{0%,100%{opacity:.01}50%{opacity:.02}}
@keyframes heatIn{from{opacity:0}to{opacity:1}}
@keyframes gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(52,211,153,.25)}70%{box-shadow:0 0 0 8px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes type-blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes orbit{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(52,211,153,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(52,211,153,.025) 1px,transparent 1px);
  background-size:44px 44px}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(52,211,153,.008) 2px,rgba(52,211,153,.008) 4px);
  animation:scanPulse 4s ease-in-out infinite}
#root{position:relative;z-index:2}
.fade-in{animation:fadeIn .35s ease both}
.card{background:#111827;border:1px solid #1e293b;border-radius:10px;padding:18px;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:#2d4a38;box-shadow:0 4px 24px rgba(52,211,153,.06)}
.card-azure{background:#0f172a;border:1px solid #1e2d45;border-radius:10px;padding:18px;transition:border-color .2s}
.card-azure:hover{border-color:#2a4060}
.card-pwned{background:#120c06;border:1px solid #2a1e10;border-radius:10px;padding:18px;transition:border-color .2s}
.card-pwned:hover{border-color:#3d2a14}
.section-title{font-family:'Orbitron',monospace;font-size:11px;color:#34d399;letter-spacing:1.5px;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #1e293b;text-transform:uppercase}
.section-title-azure{font-family:'Orbitron',monospace;font-size:11px;color:#60a5fa;letter-spacing:1.5px;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #1e2d45;text-transform:uppercase}
.section-title-pwned{font-family:'Orbitron',monospace;font-size:11px;color:#fb923c;letter-spacing:1.5px;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #2a1e10;text-transform:uppercase}
.tab-btn{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:.5px;
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:#64748b;padding:10px 22px;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:#94a3b8}
.tab-btn.active{color:#34d399;border-bottom-color:#34d399;background:#34d39910}
.tab-btn-azure.active{color:#60a5fa;border-bottom-color:#60a5fa;background:#60a5fa10}
.tab-btn-pwned.active{color:#fb923c;border-bottom-color:#fb923c;background:#fb923c10}
.btn{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:.5px;
  background:transparent;border:1px solid #34d399;color:#34d399;
  padding:9px 18px;border-radius:6px;cursor:pointer;box-shadow:0 0 12px #34d39920;transition:all .2s}
.btn:hover{background:#34d39912;box-shadow:0 0 24px #34d39944}
.btn-azure{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:.5px;
  background:transparent;border:1px solid #60a5fa;color:#60a5fa;
  padding:9px 18px;border-radius:6px;cursor:pointer;box-shadow:0 0 12px #60a5fa20;transition:all .2s}
.btn-azure:hover{background:#60a5fa12;box-shadow:0 0 24px #60a5fa44}
.btn-sm{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:.5px;
  padding:5px 10px;border-radius:4px;cursor:pointer;transition:all .2s;
  border:1px solid #2d3748;color:#64748b;background:transparent}
.btn-sm:hover{border-color:#94a3b8;color:#94a3b8}
.input{font-family:'Share Tech Mono',monospace;font-size:13px;background:#111827;
  border:1px solid #2d3748;color:#e2e8f0;padding:8px 14px;
  border-radius:6px;outline:none;transition:border-color .2s}
.input:focus{border-color:#34d39966}
.input-azure{font-family:'Share Tech Mono',monospace;font-size:13px;background:#0d1117;
  border:1px solid #1e2d45;color:#e2e8f0;padding:8px 14px;
  border-radius:6px;outline:none;transition:border-color .2s}
.input-azure:focus{border-color:#60a5fa66}
.chip{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:.5px;
  padding:5px 11px;border-radius:4px;cursor:pointer;transition:all .15s;
  border:1px solid #2d3748;color:#64748b;background:transparent;white-space:nowrap}
.chip:hover{border-color:#94a3b8;color:#e2e8f0}
.chip.active-green{border-color:#34d399;color:#34d399;background:#34d39912}
.pf-elite{background:#1f0a35;color:#a78bfa;border:1px solid #a78bfa44}
.pf-advanced{background:#1f1208;color:#fb923c;border:1px solid #fb923c44}
.pf-moderate{background:#0a1628;color:#60a5fa;border:1px solid #60a5fa44}
.pf-starter{background:#0a2218;color:#34d399;border:1px solid #34d39944}
</style>
<style id="g-enh-css">
/* ── BACKGROUND ── */
#g-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:.8}
#g-burst{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9989;pointer-events:none}

/* ── BRIEF MODAL ── */
#g-brief{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
  background:rgba(7,8,14,.88);backdrop-filter:blur(6px)}
.g-brief-card{background:#090912;border:1px solid #34d39930;border-radius:14px;
  padding:32px 36px;max-width:520px;width:90%;
  box-shadow:0 0 80px rgba(52,211,153,.1),0 0 160px rgba(52,211,153,.04);
  animation:g-rise .5s cubic-bezier(.34,1.2,.64,1) both}
@keyframes g-rise{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:none}}

/* ── HUD PANEL ── */
#g-hud{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:9990;width:260px}
#g-hud-wrap{background:rgba(9,9,18,.95);border:1px solid #1e293b;border-radius:12px;
  overflow:hidden;backdrop-filter:blur(16px);
  box-shadow:0 0 40px rgba(0,0,0,.5)}
.g-hdr{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,#0c0e1a 0%,#0f1320 100%);
  border-bottom:1px solid #1a2030;cursor:pointer;user-select:none}
.g-hdr-title{font-family:Orbitron,monospace;font-size:11px;font-weight:900;letter-spacing:2px}
.g-mini-wrap{display:flex;align-items:center;gap:8px}
.g-close{width:19px;height:19px;border-radius:50%;border:1px solid #2d3748;background:transparent;
  color:#4a5568;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-family:Orbitron,monospace;flex-shrink:0}
.g-close:hover{border-color:#34d399;color:#34d399}
.g-top{padding:10px 13px;border-bottom:1px solid #0d0f18}
.g-nav{display:flex;background:#060709;border-bottom:1px solid #0d0f18}
.g-ntab{flex:1;padding:7px 2px;background:transparent;border:none;border-bottom:2px solid transparent;
  color:#2d3748;cursor:pointer;transition:all .15s;font-family:Orbitron,monospace;
  font-size:8px;font-weight:700;letter-spacing:.2px}
.g-ntab:hover{color:#64748b}
.g-ntab.on{color:var(--tc);border-bottom-color:var(--tc)}
.g-content{padding:11px 13px;max-height:320px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#1e293b transparent}
.g-content::-webkit-scrollbar{width:3px}
.g-content::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.g-lbl{font-family:Orbitron,monospace;font-size:8.5px;color:#374151;letter-spacing:1px;
  margin-bottom:6px;text-transform:uppercase}
.g-bar-bg{height:3.5px;background:#1e293b;border-radius:100px;overflow:hidden}
.g-bar-fill{height:100%;border-radius:100px;transition:width 1s ease;position:relative;overflow:hidden}
.g-bar-fill::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 40%,rgba(255,255,255,.25) 60%,transparent 80%);
  background-size:200% 100%;animation:g-shim 2.5s linear infinite}
@keyframes g-shim{from{background-position:200% 0}to{background-position:-200% 0}}
.g-stat-big{font-family:Orbitron,monospace;font-weight:700;line-height:1}
.g-rank-bar{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;
  margin-bottom:7px;transition:all .3s}
.g-pomo-ring{position:relative;display:flex;align-items:center;justify-content:center;
  width:80px;height:80px;margin:2px auto 8px}
.g-pomo-time{position:absolute;font-family:Orbitron,monospace;font-weight:700;font-size:15px;
  text-align:center;line-height:1;letter-spacing:1px}
.g-pomo-mode{position:absolute;bottom:10px;font-size:7px;color:#374151;letter-spacing:.8px;
  font-family:Orbitron,monospace;text-align:center}
.g-pomo-btns{display:flex;gap:6px;justify-content:center;margin-top:2px}
.g-btn{font-family:Orbitron,monospace;font-size:9px;font-weight:700;letter-spacing:.3px;
  padding:5px 11px;border-radius:4px;border:1px solid #1e293b;background:transparent;
  color:#4a5568;cursor:pointer;transition:all .15s;text-transform:uppercase}
.g-btn:hover{border-color:#34d399;color:#34d399;background:#34d39908}
.g-btn.active{border-color:#34d399;color:#34d399;background:#34d39912}
.g-mode-btns{display:flex;gap:4px;margin-bottom:8px}
.g-mode-btn{flex:1;padding:4px 2px;background:transparent;border:1px solid transparent;
  border-radius:3px;font-family:Orbitron,monospace;font-size:7.5px;font-weight:700;
  color:#2d3748;cursor:pointer;transition:all .15s}
.g-mode-btn.on{border-color:var(--pc);color:var(--pc);background:rgba(0,0,0,.3)}
.g-quote{font-family:Share\ Tech\ Mono,monospace;font-size:10.5px;color:#5eaeff;
  font-style:italic;line-height:1.65;margin-bottom:5px}
.g-quote-src{font-family:Orbitron,monospace;font-size:8px;color:#2d3748;letter-spacing:.5px}
.g-cd{display:flex;gap:6px;justify-content:center;margin-top:4px}
.g-cd-blk{text-align:center;min-width:44px}
.g-cd-n{font-family:Orbitron,monospace;font-size:22px;font-weight:700;
  color:#fb923c;text-shadow:0 0 14px #fb923c55;line-height:1}
.g-cd-l{font-size:7.5px;color:#374151;letter-spacing:.7px;margin-top:2px;font-family:Orbitron,monospace}
.g-jinput{width:100%;background:#080a10;border:1px solid #1e293b;border-radius:5px;
  color:#e2e8f0;font-family:Share\ Tech\ Mono,monospace;font-size:11px;
  padding:7px 10px;outline:none;resize:none;transition:border-color .2s;box-sizing:border-box}
.g-jinput:focus{border-color:#34d39950}
.g-je{font-size:10px;color:#94a3b8;margin-top:5px;padding:5px 8px;
  background:#080a10;border-radius:4px;border-left:2px solid #34d39930;line-height:1.5}
.g-je-d{font-family:Orbitron,monospace;font-size:7.5px;color:#2d3748;letter-spacing:.5px;margin-bottom:2px}
.g-sinput{width:100%;background:#080a10;border:1px solid #1e293b;border-radius:4px;
  color:#e2e8f0;font-family:Share\ Tech\ Mono,monospace;font-size:11px;
  padding:6px 9px;outline:none;transition:border-color .2s;box-sizing:border-box;margin-bottom:6px}
.g-sinput:focus{border-color:#34d39950}
.g-footer{padding:6px 13px;background:#040507;display:flex;justify-content:space-between;
  align-items:center;border-top:1px solid #0d0f18}

/* ── MINI STATE ── */
#g-hud.mini #g-hud-wrap{border-radius:50%;width:46px;height:46px;overflow:hidden}
#g-hud.mini{width:46px}

/* ── TOASTS ── */
#g-toasts{position:fixed;top:18px;right:290px;z-index:9991;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.g-toast{font-family:Orbitron,monospace;font-size:11px;font-weight:700;letter-spacing:.4px;
  padding:9px 16px;border-radius:7px;backdrop-filter:blur(10px);
  display:flex;align-items:center;gap:8px;white-space:nowrap;
  animation:g-tin .35s cubic-bezier(.34,1.3,.64,1) both}
.g-toast.out{animation:g-tout .28s ease forwards}
.g-toast-xp{background:#071410;border:1px solid #34d39945;color:#34d399;box-shadow:0 0 20px rgba(52,211,153,.2)}
.g-toast-ach{background:#08071a;border:1px solid #a78bfa45;color:#a78bfa;box-shadow:0 0 20px rgba(167,139,250,.2)}
.g-toast-rank{background:#160f00;border:1px solid #fbbf2445;color:#fbbf24;box-shadow:0 0 20px rgba(251,191,36,.22)}
@keyframes g-tin{from{opacity:0;transform:translateX(20px) scale(.94)}to{opacity:1;transform:none}}
@keyframes g-tout{to{opacity:0;transform:translateX(16px)}}

/* ── ACHIEVEMENT ── */
#g-ach{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:9992;pointer-events:none}
.g-ach-card{background:#08071a;border:1px solid #a78bfa40;border-radius:11px;
  padding:14px 20px;display:flex;align-items:center;gap:14px;
  box-shadow:0 0 40px rgba(167,139,250,.28);
  animation:g-apop .55s cubic-bezier(.34,1.5,.64,1) both}
@keyframes g-apop{from{opacity:0;transform:translateY(20px) scale(.8)}to{opacity:1;transform:none}}

/* ── COMPLETION FLASH ── */
#g-flash{position:fixed;inset:0;z-index:9988;pointer-events:none;background:rgba(52,211,153,0)}
#g-flash.fire{animation:g-flash .55s ease forwards}
@keyframes g-flash{0%{background:rgba(52,211,153,0)}15%{background:rgba(52,211,153,.04)}100%{background:rgba(52,211,153,0)}}

/* ── MISC ENHANCEMENTS ── */
@keyframes g-fire{0%,100%{transform:scaleY(1) scaleX(1)}25%{transform:scaleY(1.07) scaleX(.97)}75%{transform:scaleY(.96) scaleX(1.03)}}
@keyframes g-beacon{0%,100%{box-shadow:0 0 0 0 var(--bc,#34d399)}70%{box-shadow:0 0 0 8px rgba(0,0,0,0)}}
@keyframes g-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.card{transition:border-color .25s,box-shadow .25s,transform .18s!important}
.card:hover{transform:translateY(-1px)!important;box-shadow:0 6px 28px rgba(52,211,153,.08)!important}
</style>
</head>

    console.log('[Genesis] Snapshot data restored to localStorage successfully.');
  }catch(e){console.error('[Genesis] Snapshot restore failed:',e);}
})();
</script>

99",icon:"\u25C8",desc:"Passive intel gathering, cloud footprint discovery, and git archaeology."},{id:"phase2",n:2,label:"Phase 2",title:"Scanning & Enumeration",weeks:"Weeks 7\u201312",col:"#38bdf8",icon:"\u25C9",desc:"Port scanning intelligence, web tech profiling, and network protocol attacks."},{id:"phase3",n:3,label:"Phase 3",title:"Web Application Attacks",weeks:"Weeks 13\u201320",col:"#fb923c",icon:"\u25C6",desc:"XSS, SQLi, JWT, cache poisoning, SSRF, prototype pollution, race conditions, deserialization."},{id:"phase4",n:4,label:"Phase 4",title:"Active Directory & Windows",weeks:"Weeks 21\u201328",col:"#a78bfa",icon:"\u25C7",desc:"AD attack graphs, Kerberos attacks, token manipulation, lateral movement, AV evasion."},{id:"phase5",n:5,label:"Phase 5",title:"Cloud & Azure Security",weeks:"Weeks 29\u201336",col:"#60a5fa",icon:"\u2B21",desc:"Azure tenant recon, Entra ID attacks, RBAC privesc, serverless exploitation, M365 post-compromise."},{id:"phase6",n:6,label:"Phase 6",title:"Network & Infrastructure",weeks:"Weeks 37\u201342",col:"#f59e0b",icon:"\u25EB",desc:"Multi-protocol tunneling, WiFi attacks, network poisoning, VPN exploitation, container escape."},{id:"phase7",n:7,label:"Phase 7",title:"Automation, AI & Mail",weeks:"Weeks 43\u201348",col:"#f472b6",icon:"\u25C9",desc:"AI-powered security tools, adaptive fuzzing, email security, report generation, pipeline orchestration."},{id:"phase8",n:8,label:"Phase 8",title:"Capstone & Documentation",weeks:"Weeks 49\u201352",col:"#fbbf24",icon:"\u2605",desc:"Playbook, lab environment, zero-day hunting, and interactive portfolio site."}],Gt=[{id:"pw1",week:1,phase:"phase1",name:"DorkStorm",diff:"Moderate",desc:"Auto-Google-Dorking engine with AI categorization. Takes a target domain, generates hundreds of dork queries, categorizes findings by severity via LLM. Output: structured HTML/PDF report.",novel:"Categorizes, deduplicates, and risk-ranks automatically \u2014 not just query execution.",tech:"Python, LLM API, HTML/PDF",mitre:"T1596.002"},{id:"pw2",week:2,phase:"phase1",name:"SubSleuth",diff:"Moderate",desc:"Passive subdomain discovery + historical DNS diff tool. Aggregates from 10+ sources and shows what subdomains appeared/disappeared over time.",novel:"Historical diff angle \u2014 disappearing subdomains = subdomain takeover candidates.",tech:"Python, DNS APIs, crt.sh, Wayback",mitre:"T1596.001"},{id:"pw3",week:3,phase:"phase1",name:"CloudSnitch",diff:"Moderate",desc:"Multi-cloud misconfiguration scanner from the outside. Discovers Azure blobs, S3 buckets, GCP storage and checks for public access without authentication.",novel:"Combines cloud asset discovery with external misconfiguration testing in one pass.",tech:"Python, AWS/Azure/GCP APIs, DNS",mitre:"T1530"},{id:"pw4",week:4,phase:"phase1",name:"GitGrave",diff:"Advanced",desc:"Secrets archaeology tool for public git repos. Walks entire commit history, finds deleted/overwritten secrets, validates them against live services.",novel:"Secret validation on historical commits \u2014 not just scanning current state.",tech:"Python, GitPython, AWS STS, regex",mitre:"T1552.004"},{id:"pw5",week:5,phase:"phase1",name:"ASNMap-X",diff:"Advanced",desc:"Visual attack surface mapper via ASN enumeration. Takes org name \u2192 resolves ASNs \u2192 enumerates IP ranges \u2192 port fingerprinting \u2192 interactive D3.js graph.",novel:"Interactive visual graph of an org's full internet-facing surface.",tech:"Python, D3.js, Shodan API, nmap",mitre:"T1590.005"},{id:"pw6",week:6,phase:"phase1",name:"LinkedIntel",diff:"Moderate",desc:"OSINT employee intelligence gathering. Scrapes public LinkedIn data for employee names, roles, tech stack, email pattern detection and phishing target list.",novel:"Bridges OSINT and social engineering prep \u2014 org chart to phishing list pipeline.",tech:"Python, Google Dorking, regex",mitre:"T1591.004"},{id:"pw7",week:7,phase:"phase2",name:"PortPilot",diff:"Moderate",desc:"Intelligent port scanner with service-specific follow-ups. Finds port 445 \u2192 auto-runs SMB enum; finds 6379 \u2192 tries Redis commands. Plugin-based architecture.",novel:"Dynamic follow-up per service, not just open/closed detection.",tech:"Python, Scapy, plugin system",mitre:"T1046"},{id:"pw8",week:8,phase:"phase2",name:"WAPProbe",diff:"Moderate",desc:"Web application profiler beyond Wappalyzer. Fingerprints tech stack, pulls CVEs from NVD per detected version, estimates exploitability. One command \u2192 full risk profile.",novel:"Tech fingerprinting + automatic CVE correlation per detected version.",tech:"Python, NVD API, Wappalyzer signatures",mitre:"T1592.002"},{id:"pw9",week:9,phase:"phase2",name:"APIGhost",diff:"Advanced",desc:"Hidden API endpoint discovery. Crawls JS files, extracts REST & GraphQL endpoints, fuzzes undocumented routes, tests auth bypass on each. Outputs Postman/Bruno collection.",novel:"JS parsing + fuzzing + auth bypass testing + exportable collection.",tech:"Python, AST parsing, OpenAPI, Bruno",mitre:"T1190"},{id:"pw10",week:10,phase:"phase2",name:"CertHunt",diff:"Moderate",desc:"TLS Certificate Transparency real-time monitor. Watches CT logs for target domain, alerts on new cert issuance, checks if subdomain is live, runs basic fingerprinting.",novel:"Real-time CT log monitoring with instant recon on new findings \u2014 subdomain takeover.",tech:"Python, certstream, asyncio",mitre:"T1596.003"},{id:"pw11",week:11,phase:"phase2",name:"SMBCrawler",diff:"Moderate",desc:"Authenticated SMB share intelligence gatherer. Crawls all accessible shares, identifies sensitive files by content pattern matching (passwords, configs, PII), builds loot map.",novel:"Content-aware SMB crawling with sensitivity classification.",tech:"Python, impacket, regex classifiers",mitre:"T1039"},{id:"pw12",week:12,phase:"phase2",name:"DNSRebinder",diff:"Advanced",desc:"Complete DNS rebinding attack framework. Sets up malicious DNS alternating between attacker IP and internal IP, hosts payload page, demonstrates attacks against internal services.",novel:"Full end-to-end DNS rebinding toolkit \u2014 most existing ones are broken.",tech:"Python, dnslib, Flask, JS payload",mitre:"T1557"},{id:"pw13",week:13,phase:"phase3",name:"XSSHunter-Lite",diff:"Moderate",desc:"Self-hosted blind XSS callback platform. Generates unique payloads, hosts callback server, captures screenshots, cookies, DOM, and URL when blind XSS fires.",novel:"Fully self-hosted, lightweight, no third-party dependency \u2014 privacy-first.",tech:"Python, FastAPI, headless Chrome, SQLite",mitre:"T1059.007"},{id:"pw14",week:14,phase:"phase3",name:"SQLiDumper",diff:"Advanced",desc:"Intelligent SQLi exploitation assistant. Automates data extraction with binary search for blind SQLi, time-based optimization, WAF detection and evasion.",novel:"WAF-aware extraction with multiple evasion strategies baked in.",tech:"Python, requests, charset encoding",mitre:"T1190"},{id:"pw15",week:15,phase:"phase3",name:"JWTForge",diff:"Advanced",desc:"All-in-one JWT exploitation suite. None algorithm, key confusion (RS256\u2192HS256), brute-force weak secrets, kid injection, JKU/X5U spoofing. Takes a JWT, runs all attacks.",novel:"Comprehensive \u2014 most tools do 1-2 JWT attacks. This does all 6+.",tech:"Python, pyjwt, hashcat integration",mitre:"T1550.001"},{id:"pw16",week:16,phase:"phase3",name:"CachePoisoner",diff:"Advanced",desc:"Web cache poisoning detection & exploitation. Tests unkeyed headers, identifies cacheable responses, attempts to poison them. Based on James Kettle's research \u2014 fully automated.",novel:"Automating Kettle's manual techniques into a push-button tool.",tech:"Python, requests, cache analysis",mitre:"T1134"},{id:"pw17",week:17,phase:"phase3",name:"SSRFMap-Pro",diff:"Advanced",desc:"Context-aware SSRF exploitation framework. Detects SSRF, auto-escalates: cloud metadata (AWS/Azure/GCP with IMDSv2 bypass), internal scanning, file://, gopher:// abuse.",novel:"Cloud-provider-aware SSRF escalation with IMDSv2 bypass attempts.",tech:"Python, requests, urllib3",mitre:"T1090.001"},{id:"pw18",week:18,phase:"phase3",name:"ProtoSmash",diff:"Elite",desc:"Prototype pollution scanner & exploiter. Static analysis of JS for gadgets, dynamic testing of query params and JSON body pollution, automatic gadget chain detection for XSS/RCE.",novel:"Combines static gadget analysis with dynamic exploitation \u2014 rare capability.",tech:"Python, JS AST parser, puppeteer",mitre:"T1059.007"},{id:"pw19",week:19,phase:"phase3",name:"RaceTheWeb",diff:"Advanced",desc:"Race condition / TOCTOU exploitation tool. Sends concurrent requests for coupon reuse, double-spending, simultaneous operations. Visual timeline showing which requests won the race.",novel:"Visual timeline of race condition exploitation is unique and educational.",tech:"Python, asyncio, aiohttp, matplotlib",mitre:"T1499"},{id:"pw20",week:20,phase:"phase3",name:"DeserialKill",diff:"Elite",desc:"Multi-language deserialization payload generator. Java (ysoserial-like), PHP, Python pickle, .NET, Ruby. Specify: target language, known libraries, desired action. Outputs ready payloads.",novel:"Multi-language in one tool with library-aware payload selection.",tech:"Java, Python, Ruby, .NET, PHP",mitre:"T1059"},{id:"pw21",week:21,phase:"phase4",name:"ADRecon-Viz",diff:"Advanced",desc:"Active Directory reconnaissance visualizer. Runs AD enum (users, groups, GPOs, ACLs, Kerberos) and outputs interactive attack graph showing paths to Domain Admin.",novel:"BloodHound-lite you built yourself, with your own graph engine.",tech:"Python, ldap3, networkx, D3.js",mitre:"T1069.002"},{id:"pw22",week:22,phase:"phase4",name:"KerbCrack",diff:"Advanced",desc:"Kerberos attack automation suite. AS-REP Roasting, Kerberoasting, Silver Ticket forging, Golden Ticket forging. Integrates with hashcat/john. Menu-driven, educational output.",novel:"All Kerberos attacks in one unified, educational interface.",tech:"Python, impacket, hashcat",mitre:"T1558"},{id:"pw23",week:23,phase:"phase4",name:"TokenThief",diff:"Elite",desc:"Windows token manipulation toolkit. Token impersonation, duplication, privilege escalation via SeImpersonatePrivilege exploitation, token stealing from processes, maketoken.",novel:"Educational implementation with detailed explanation of each Windows internals technique.",tech:"C#, Win32 API, P/Invoke",mitre:"T1134.001"},{id:"pw24",week:24,phase:"phase4",name:"LateralMover",diff:"Elite",desc:"Lateral movement technique library. 10+ techniques: WMI, PSExec, DCOM, WinRM, scheduled tasks, service creation, SCM, RDP hijacking. Each module has detection guidance.",novel:"Side-by-side comparison of detection footprint per technique.",tech:"C#, Python, impacket, WMI",mitre:"T1021"},{id:"pw25",week:25,phase:"phase4",name:"PrivEscAlator",diff:"Elite",desc:"Windows privilege escalation autopwn. Checks unquoted service paths, writable binaries, AlwaysInstallElevated, stored creds, token privs, DLL hijacking \u2014 auto-exploits first viable vector.",novel:"Not just enumeration like WinPEAS \u2014 it auto-exploits.",tech:"C#, PowerShell, Win32 API",mitre:"T1068"},{id:"pw26",week:26,phase:"phase4",name:"PhishForge",diff:"Advanced",desc:"Realistic phishing infrastructure generator. Lookalike domains, GoPhish + evilginx2-style reverse proxy for token capture, configures DKIM/SPF/DMARC to pass email authentication.",novel:"End-to-end phishing infra with email authentication bypass \u2014 full red team grade.",tech:"Go, Python, GoPhish, evilginx2",mitre:"T1566.002"},{id:"pw27",week:27,phase:"phase4",name:"BypassAV",diff:"Elite",desc:"AV/EDR evasion payload generator. Direct syscalls (ntdll unhooking), shellcode encryption, AMSI bypass, ETW patching, process hollowing, module stomping. Choose technique \u2192 compiled binary.",novel:"Multiple evasion techniques selectable per payload, not just one trick.",tech:"C, MASM, Python, AES/XOR",mitre:"T1562.001"},{id:"pw28",week:28,phase:"phase4",name:"C2Lint",diff:"Advanced",desc:"C2 framework comparison & detection analyzer. Sets up 5 C2 frameworks (Sliver, Havoc, Mythic, CS, Villain), runs identical operations, captures telemetry, produces comparison matrix.",novel:"Rigorous, reproducible head-to-head C2 comparison with actual telemetry. Will be bookmarked by thousands.",tech:"Lab setup, Python analysis, Docker",mitre:"T1071"},{id:"pw29",week:29,phase:"phase5",name:"AzureRecon",diff:"Moderate",desc:"Azure tenant external recon toolkit. From zero: enumerate tenant, discover Azure services via DNS bruting, check OAuth endpoints, enumerate users via timing attacks on login.microsoftonline.com.",novel:"Comprehensive Azure-specific external recon \u2014 most tools focus on AWS.",tech:"Python, Azure APIs, DNS",mitre:"T1526"},{id:"pw30",week:30,phase:"phase5",name:"EntraBreaker",diff:"Advanced",desc:"Entra ID (Azure AD) attack simulation tool. Password spraying with smart lockout avoidance, OAuth consent phishing, application permission abuse, CA Policy bypass testing.",novel:"Entra ID-specific attack tool \u2014 extremely relevant for Azure-heavy orgs.",tech:"Python, MSAL, AADInternals-style",mitre:"T1110.003"},{id:"pw31",week:31,phase:"phase5",name:"AzurePrivEsc",diff:"Elite",desc:"Azure RBAC privilege escalation path finder. Enumerates all role assignments, custom role definitions, identifies escalation paths. Outputs attack graph like BloodHound for Azure RBAC.",novel:"Azure-specific privilege escalation graphing.",tech:"Python, Azure SDK, networkx, D3.js",mitre:"T1484.001"},{id:"pw32",week:32,phase:"phase5",name:"FunctionJack",diff:"Advanced",desc:"Azure Functions & Logic Apps exploitation kit. Discovers functions via DNS bruting, tests auth bypass, extracts env vars, demonstrates event injection and poisoned dependencies.",novel:"Serverless-specific offensive toolkit for Azure \u2014 almost nothing exists here.",tech:"Python, Azure Functions API",mitre:"T1525"},{id:"pw33",week:33,phase:"phase5",name:"CloudKeyRotator",diff:"Moderate",desc:"Multi-cloud credential exposure validator. Paste any credential (AWS, Azure, GCP, GitHub PAT) \u2192 identifies provider, validates if active, enumerates permissions, assesses blast radius.",novel:"Universal credential validator with blast radius assessment.",tech:"Python, boto3, azure-sdk, google-auth",mitre:"T1552.005"},{id:"pw34",week:34,phase:"phase5",name:"ManagedIDPwn",diff:"Advanced",desc:"Azure Managed Identity attack tool. From compromised VM/App Service: detects MI, extracts tokens from IMDS, enumerates what identity can access, demonstrates data exfiltration paths.",novel:"Focused tool for the increasingly common managed identity attack path.",tech:"Python, IMDS, Azure REST API",mitre:"T1552.005"},{id:"pw35",week:35,phase:"phase5",name:"365Reaper",diff:"Advanced",desc:"Microsoft 365 post-compromise toolkit. Dumps emails via Graph API, searches SharePoint/OneDrive/Teams for sensitive content, extracts OAuth tokens, sets up inbox rules, consent backdoors.",novel:"Full M365 post-exploitation \u2014 shows the real danger of one compromised account.",tech:"Python, Microsoft Graph API",mitre:"T1114.002"},{id:"pw36",week:36,phase:"phase5",name:"SentinelBlind",diff:"Elite",desc:"Microsoft Sentinel detection rule bypasser. Fetches default Sentinel KQL rules from GitHub, analyzes what they detect, suggests specific bypass techniques for each rule.",novel:"Offensive-meets-defensive: shows you understand both sides at a deep level.",tech:"Python, KQL parser, Graph API",mitre:"T1562.008"},{id:"pw37",week:37,phase:"phase6",name:"TunnelVision",diff:"Advanced",desc:"Multi-protocol tunneling toolkit. DNS tunneling, ICMP tunneling, HTTPS over DNS (DoH abuse), WebSocket tunneling. Each protocol is a module with bandwidth/stealth comparison.",novel:"Multi-protocol in one tool with side-by-side bandwidth/stealth comparison.",tech:"Python, dnslib, Scapy, WebSockets",mitre:"T1572"},{id:"pw38",week:38,phase:"phase6",name:"WiFiReaper",diff:"Moderate",desc:"Automated WiFi attack framework. WPA2 handshake capture + hashcat cracking, evil twin AP creation, PMKID attack, WPA Enterprise credential capture. Menu-driven, standard Alfa adapters.",novel:"Unified tool covering all major WiFi attack vectors with hardware detection.",tech:"Python, scapy, hostapd-mana",mitre:"T1557.003"},{id:"pw39",week:39,phase:"phase6",name:"NetPoisoner",diff:"Advanced",desc:"Network protocol poisoning suite. ARP spoofing with credential sniffing, LLMNR/NBT-NS poisoning (your own Responder), DHCPv6 poisoning, WPAD abuse. Real-time credential display.",novel:"Your own Responder-like tool \u2014 shows deep protocol understanding.",tech:"Python, Scapy, asyncio",mitre:"T1557.001"},{id:"pw40",week:40,phase:"phase6",name:"VPNBreaker",diff:"Advanced",desc:"VPN misconfiguration exploitation toolkit. IKE aggressive mode (PSK extraction), SSL VPN path traversal (Fortinet/Pulse CVEs), split tunneling detection, credential spraying.",novel:"VPN-focused offensive tool \u2014 high-value targets rarely covered.",tech:"Python, ikescan, requests",mitre:"T1133"},{id:"pw41",week:41,phase:"phase6",name:"ContainerBreak",diff:"Elite",desc:"Container escape & Kubernetes attack tool. Detects if in container, checks escape vectors (privileged mode, docker socket, cap_sys_admin), attempts escape, then K8s lateral movement.",novel:"End-to-end container escape \u2192 K8s exploitation chain.",tech:"Go, Python, K8s API",mitre:"T1611"},{id:"pw42",week:42,phase:"phase6",name:"PacketForge",diff:"Moderate",desc:"Custom protocol fuzzer & packet crafter. Interactive TUI (Scapy-based): build packets layer by layer, save templates, replay with mutations. Built-in templates for protocol attacks.",novel:"TUI-based interactive packet crafting \u2014 educational and uniquely visual.",tech:"Python, Scapy, textual TUI",mitre:"T1499.003"},{id:"pw43",week:43,phase:"phase7",name:"VulnGPT",diff:"Starter",desc:"AI-powered vulnerability explainer & exploit suggester. Paste a CVE \u2192 pulls NVD details, searches ExploitDB/GitHub, generates step-by-step exploitation guide and detection recommendations.",novel:"AI-powered exploit research assistant \u2014 massive time saver for any pentester.",tech:"Python, OpenAI API, NVD API",mitre:"T1203"},{id:"pw44",week:44,phase:"phase7",name:"FuzzBrain",diff:"Advanced",desc:"AI-guided web fuzzer. Sends requests, analyzes responses, intelligently mutates payloads based on error messages, WAF responses, and application behavior. Learns as it goes.",novel:"AI-adaptive fuzzing \u2014 not wordlist-based, but response-aware and intelligent.",tech:"Python, OpenAI API, requests, aiohttp",mitre:"T1190"},{id:"pw45",week:45,phase:"phase7",name:"MailSpear",diff:"Starter",desc:"Email security assessment tool. Checks SPF/DKIM/DMARC, tests spoofing possibilities, checks blocklists, tests email gateway filtering, rates overall email security posture.",novel:"Full email security assessment from attacker's perspective in one tool.",tech:"Python, DNS, smtplib, MX records",mitre:"T1566"},{id:"pw46",week:46,phase:"phase7",name:"ReportForge",diff:"Starter",desc:"Pentest report generator. Takes structured findings (JSON/YAML) and generates professional pentest reports in PDF/HTML with executive summary, CVSS auto-calc, and remediation timelines.",novel:"Every pentester needs this \u2014 most existing generators are ugly or expensive.",tech:"Python, Jinja2, WeasyPrint, CVSS",mitre:"N/A"},{id:"pw47",week:47,phase:"phase7",name:"ScanOrchestrator",diff:"Moderate",desc:"Reconnaissance pipeline orchestrator. Chains tools (nmap, ffuf, nuclei) into automated YAML-defined workflows: subdomain enum \u2192 port scan \u2192 web app scan. Parallel execution, unified output.",novel:"Your own recon automation framework \u2014 ties your entire portfolio together.",tech:"Python, YAML, asyncio, Docker",mitre:"T1595"},{id:"pw48",week:48,phase:"phase7",name:"BugBountyDash",diff:"Moderate",desc:"Personal bug bounty dashboard. Tracks targets, subdomains, ports, vulnerabili function lget(k){try{var r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}}
function lset(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function loadState(){
  var s=lget(EK);
  return s||{xp:0,streak:0,lastDate:null,lastBrief:null,todayXP:0,journal:[],unlocked:[],
              bossDate:'2026-11-30',bossName:'MAPT Certification',quoteIdx:0,tab:'xp',mini:false};
}
var state=loadState();
function save(){lset(EK,state);}

/* ── COMPUTED STATS ───────────────────────────────────────────────────────── */
function stats(){
  var az=lget(AK)||{}, pw=lget(PK)||{};
  var mach=((lget(MK)||{}).machines)||[];
  var isl=lget(IK)||{}, bu=lget(BK)||{}, po=lget(FK)||{};
  var azC=Object.values(az).filter(function(p){return p&&p.labBuilt&&p.techniquesExecuted&&p.documented;}).length;
  var pwC=Object.values(pw).filter(function(p){return p&&p.completed;}).length;
  var mC=mach.filter(function(m){return m.completed;}).length;
  var iC=Object.values(isl).filter(function(r){return r&&r.done;}).length;
  var bC=Object.values(bu).filter(function(b){return b&&b.done;}).length;
  var pC=Object.values(po).filter(function(p){return p&&p.built&&p.published;}).length;
  return {xp:azC*25+pwC*15+mC*10+iC*5+bC*20+pC*12,
          az:azC,pw:pwC,mach:mC,isl:iC,bu:bC,po:pC,
          total:azC+pwC+mC+iC+bC+pC};
}

/* ── RANK ─────────────────────────────────────────────────────────────────── */
function getRank(xp){
  var r=RANKS[0];
  for(var i=0;i<RANKS.length;i++){if(xp>=RANKS[i].min)r=RANKS[i];else break;}
  var idx=RANKS.indexOf(r), nxt=RANKS[idx+1]||null;
  var pct=nxt?Math.min(Math.round(((xp-r.min)/(nxt.min-r.min))*100),100):100;
  return {name:r.name,col:r.col,icon:r.icon,next:nxt,pct:pct};
}

/* ── HIJRI DATE ───────────────────────────────────────────────────────────── */
function hijri(date){
  var y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  var jd=Math.floor((14-m)/12);
  var y2=y+4800-jd; var m2=m+12*jd-3;
  var julDay=d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;
  var l=julDay-1948440+10632;
  var n=Math.floor((l-1)/10631);
  l=l-10631*n+354;
  var j2=Math.floor((10985-l)/5965);
  l=l-5964*j2+29;
  var hm=Math.floor(l*30/869);
  var hd=l-Math.floor(hm*869/30);
  var hy=30*n+j2-30; hm=hm+1;
  var names=['Muharram','Safar','Rabi\' al-Awwal','Rabi\' al-Thani','Jumada I','Jumada II','Rajab','Sha\'ban','Ramadan','Shawwal','Dhu al-Qi\'dah','Dhu al-Hijjah'];
  return hd+' '+names[hm-1]+' '+hy+' AH';
}

/* ── NEXT OBJECTIVE ───────────────────────────────────────────────────────── */
function nextObjective(){
  var az=lget(AK)||{};
  var azPhases=['ph0','ph1','ph2','ph3','ph4','ph5','ph6','ph7','ph8','ph9','ph10','ph11','ph12'];
  var azTitles={'ph0':'Legal Framework & Tenant Setup','ph1':'Passive Reconnaissance','ph2':'Active Enumeration',
    'ph3':'Initial Access & Auth Attacks','ph4':'Post-Auth Enumeration','ph5':'Privilege Escalation',
    'ph6':'Lateral Movement','ph7':'Azure Resource Exploitation','ph8':'Persistence & Backdoors',
    'ph9':'Data Exfiltration','ph10':'Defence Evasion','ph11':'Anti-Forensics & IR','ph12':'Reporting & Remediation'};
  for(var i=0;i<azPhases.length;i++){
    var p=az[azPhases[i]]||{};
    if(!p.labBuilt||!p.techniquesExecuted||!p.documented){
      return {type:'AZURE CODEX',col:'#60a5fa',text:'Phase '+i+': '+azTitles[azPhases[i]]};
    }
  }
  var pw=lget(PK)||{};
  for(var n=1;n<=27;n++){
    var id='pl'+n;
    if(!(pw[id]||{}).completed){
      return {type:'PWNEDLABS',col:'#fb923c',text:'Lab #'+n+' — complete it'};
    }
  }
  var isl=lget(IK)||{};
  var islMods=['im1','im2','im3','im4','im5','im6','im7','im8','im9','im10'];
  for(var m=0;m<islMods.length;m++){
    if(!(isl[islMods[m]+'_1']||{}).done){
      return {type:'INTEL',col:'#fbbf24',text:'Module '+(m+1)+' — first resource pending'};
    }
  }
  return {type:'ALL CURRENT',col:'#34d399',text:'Objectives complete — advance to next tier'};
}

/* ── TOASTS ───────────────────────────────────────────────────────────────── */
function toast(msg,type){
  var c=document.getElementById('g-toasts');if(!c)return;
  var el=document.createElement('div');
  el.className='g-toast g-toast-'+(type||'xp');
  el.textContent=msg;
  c.appendChild(el);
  setTimeout(function(){
    el.classList.add('out');
    setTimeout(function(){if(el.parentNode)el.remove();},300);
  },2700);
}

/* ── ACHIEVEMENT ──────────────────────────────────────────────────────────── */
function showAch(a){
  var c=document.getElementById('g-ach');if(!c)return;
  c.innerHTML='<div class="g-ach-card"><div style="font-size:28px">'+a.icon+'</div>'
    +'<div><div style="font-family:Orbitron,monospace;font-size:9px;color:#a78bfa;letter-spacing:1.2px;margin-bottom:4px">ACHIEVEMENT UNLOCKED</div>'
    +'<div style="font-family:Orbitron,monospace;font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:2px">'+a.name+'</div>'
    +'<div style="font-family:Share Tech Mono,monospace;font-size:11px;color:#94a3b8">'+a.desc+'</div></div></div>';
  setTimeout(function(){c.innerHTML='';},4200);
}

function checkAchs(s,comp){
  var unlocked=s.unlocked||[];
  var set={};
  unlocked.forEach(function(id){set[id]=true;});
  ACHS.forEach(function(a){
    if(set[a.id])return;
    var pass=false;
    if(a.xp&&comp.total>=a.xp)pass=true;
    if(a.xpval&&(s.xp||0)>=a.xpval)pass=true;
    if(a.streak&&(s.streak||0)>=a.streak)pass=true;
    if(a.mach&&comp.mach>=a.mach)pass=true;
    if(a.intel&&comp.isl>=a.intel)pass=true;
    if(pass){
      s.unlocked=[...unlocked,a.id];
      unlocked=s.unlocked;
      set[a.id]=true;
      setTimeout(function(){showAch(a);toast(a.icon+' Achievement: '+a.name,'ach');},900);
    }
  });
}

/* ── FLASH ────────────────────────────────────────────────────────────────── */
function flash(){

  f.classList.remove('fire');

  f.classList.add('fire');
}

/* ── PARTICLE BURST ───────────────────────────────────────────────────────── */
var burstCtx=null;
function initBurst(){
  var c=document.getElementById('g-burst');if(!c)return;
  c.width=window.innerWidth;c.height=window.innerHeight;
  burstCtx=c.getContext('2d');
  window.addEventListener('resize',function(){c.width=window.innerWidth;c.height=window.innerHeight;});
}
function fireBurst(x,y,col){
  if(!burstCtx)return;
  var particles=[];
  for(var i=0;i<22;i++){
    var angle=Math.random()*Math.PI*2;
    var speed=Math.random()*4+1.5;
    particles.push({x:x,y:y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:1,r:Math.random()*2.5+1,col:col||'#34d399'});
  }
  function animBurst(){
    particles.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=0.035;p.vx*=0.96;
      burstCtx.globalAlpha=p.life;
      burstCtx.fillStyle=p.col;
      burstCtx.beginPath();burstCtx.arc(p.x,p.y,p.r,0,Math.PI*2);burstCtx.fill();
    });
    particles=particles.filter(function(p){return p.life>0;});
    burstCtx.globalAlpha=1;
    if(particles.length)requestAnimationFrame(animBurst);
    else burstCtx.clearRect(0,0,burstCtx.canvas.width,burstCtx.canvas.height);
  }
  animBurst();
}

/* ── BACKGROUND CANVAS ───────────────────────────────────────────────────── */
function initBg(){
  var c=document.getElementById('g-bg');if(!c)return;
  var ctx=c.getContext('2d');
  var W,H,particles,drops,frame=0;
  var CHARS='アイウエオカキクケコサシスセソ0123456789ABCDEF{}[]()#$%';
  var CONN2=120*120;

  function init(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    var cols=Math.floor(W/20);
    drops=[];
    for(var i=0;i<cols;i++){
      drops.push({y:Math.random()*-H,speed:Math.random()*0.45+0.15,
        alpha:Math.random()*0.07+0.02,x:i*20});
    }
    particles=[];
    for(var j=0;j<50;j++){
      particles.push({x:Math.random()*W,y:Math.random()*H,
        vx:(Math.random()-.5)*.14,vy:(Math.random()-.5)*.14,
        r:Math.random()*1.3+0.4,
        col:Math.random()>.5?'#34d399':'#60a5fa',
        a:Math.random()*.22+.06});
    }
  }
  init();
  window.addEventListener('resize',init);

  function draw(){
    frame++;
    ctx.fillStyle='rgba(9,9,18,.13)';
    ctx.fillRect(0,0,W,H);

    // Matrix rain every 2nd frame
    if(frame%2===0){
      ctx.font='12px Share Tech Mono,monospace';
      drops.forEach(function(d){
        var ch=CHARS[Math.floor(Math.random()*CHARS.length)];
        ctx.globalAlpha=d.alpha;
        ctx.fillStyle='#34d399';
        ctx.fillText(ch,d.x,d.y);
        d.y+=d.speed;
        if(d.y>H+14)d.y=Math.random()*-40;
      });
    }
    ctx.globalAlpha=1;

    // Particles
    particles.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.globalAlpha=p.a;
      ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    });

    // Constellation — every 3rd frame, squared dist (no sqrt needed for threshold)
    if(frame%3===0){
      ctx.lineWidth=.5;
      for(var i=0;i<particles.length;i++){
        for(var j=i+1;j<particles.length;j++){
          var dx=particles[i].x-particles[j].x;
          var dy=particles[i].y-particles[j].y;
          var d2=dx*dx+dy*dy;
          if(d2<CONN2){
            ctx.globalAlpha=(1-d2/CONN2)*.065;
            ctx.strokeStyle='#34d399';
            ctx.beginPath();
            ctx.moveTo(particles[i].x,particles[i].y);
            ctx.lineTo(particles[j].x,particles[j].y);
            ctx.stroke();
          }
        }
      }
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();
}

  modes:{work:{s:25*60,col:'#34d399',lbl:'DEEP WORK'},

};
function pomoToggle(){
  if(pomo.running){clearInterval(pomo.timer);pomo.running=false;renderHUD();}
  else{
    pomo.running=true;
    pomo.timer=setInterval(function(){
      pomo.secs--;
      if(pomo.secs<=0){
        clearInterval(pomo.timer);pomo.running=false;
        if(pomo.mode==='work'){
          pomo.sessions++;
          var nm=pomo.sessions%4===0?'lng':'brk';
          pomo.mode=nm;pomo.secs=pomo.modes[nm].s;
          toast('Pomodoro #'+pomo.sessions+' done! Take a break.','xp');
        } else {pomo.mode='work';pomo.secs=pomo.modes.work.s;}
      }
      renderHUD();
    },1000);
  }
}

  var R=34,C=2*Math.PI*R;
  var offset=C*(1-pct);
  var mins=String(Math.floor(pomo.secs/60)).padStart(2,'0');
  var secs=String(pomo.secs%60).padStart(2,'0');

      +['work','brk','lng'].map(function(k){

var prevXP=0;
var origSet=localStorage.setItem.bind(localStorage);
var TRACKED=new Set([AK,PK,MK,IK,BK,FK]);
localStorage.setItem=function(key,val){
  origSet(key,val);
  try{
    if(!TRACKED.has(key))return;
    var comp=stats();
    var newXP=comp.xp;
    if(newXP>prevXP){
      var gain=newXP-prevXP;
      var oldRankName=getRank(prevXP).name;
      prevXP=newXP;
      state.xp=newXP;
      state.todayXP=(state.todayXP||0)+gain;
      var newRank=getRank(newXP);
      if(newRank.name!==oldRankName){
        toast('\u26a1 RANK UP \u2014 '+newRank.icon+' '+newRank.name,'rank');
        flash();
      } else {
        var labels={25:'Azure Phase Complete!',15:'Lab Pwned!',10:'Machine Owned!',5:'Resource Logged!',20:'Bucket Goal Done!',12:'Project Published!'};
        toast('+'+gain+' XP \u2014 '+(labels[gain]||'Progress made!'),'xp');
        flash();
      }
      checkAchs(state,comp);
      save();renderHUD();
      // Particle burst at last click position
      fireBurst(window._gLastX||window.innerWidth/2,window._gLastY||window.innerHeight/2,newRank.col);
    }
  }catch(e){}
};

/* Track cursor for burst position */
document.addEventListener('click',function(e){
  window._gLastX=e.clientX;window._gLastY=e.clientY;
});

/* ── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────── */
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  var labels=['overview','azure','pwned','machines','islamic','bucket','portfolio'];
  var n=parseInt(e.key);
  if(n>=1&&n<=7){
    var btns=Array.from(document.querySelectorAll('button'));
    var navBtns=btns.filter(function(b){
      var t=b.textContent;
      return ['OVERVIEW','AZURE','PWNED','MACHINES','ISLAMIC','BUCKET','PORTFOLIO'].some(function(kw){return t.includes(kw);});
    });
    if(navBtns[n-1])navBtns[n-1].click();
  }
  if(e.key==='`'){state.mini=!state.mini;save();renderHUD();}
});

/* ── INIT ─────────────────────────────────────────────────────────────────── */
window.addEventListener('load',function(){
  // Streak check
  var today=new Date().toDateString();
  var yesterday=new Date(Date.now()-86400000).toDateString();
  if(state.lastDate!==today){
    if(state.lastDate===yesterday)state.streak=(state.streak||0)+1;
    else state.streak=1;
    state.lastDate=today;state.todayXP=0;
    save();
  }

  // Sync XP from actual completions
  var comp=stats();
  state.xp=comp.xp;
  prevXP=comp.xp;
  save();

  // Set daily quote
  state.quoteIdx=Math.floor(Date.now()/86400000)%QUOTES.length;

  initBg();
  initBurst();
  renderHUD();

  // Show daily brief after 800ms
  setTimeout(showBrief,800);

  // Tick every second for clock + countdown + pomodoro display
  setInterval(function(){renderHUD();},1000);
});

})();
</script>
</body>
</html>
